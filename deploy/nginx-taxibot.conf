# Nginx конфигурация для Taxi Bot
# Файл: /etc/nginx/sites-available/taxibot

server {
    listen 80;
    server_name 5.42.110.16;  # Замените на домен, когда купите

    # Логи
    access_log /var/log/nginx/taxibot-access.log;
    error_log /var/log/nginx/taxibot-error.log;

    # Максимальный размер загружаемых файлов
    client_max_body_size 10M;

    # WebApp (карта)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Админ панель
    location /admin {
        proxy_pass http://127.0.0.1:8080/admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints
    location /api {
        proxy_pass http://127.0.0.1:8080/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Статические файлы (если есть)
    location /static {
        alias /opt/taxibot/webapp/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

